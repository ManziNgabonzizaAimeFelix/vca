<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCA Connect – Victory Christian Academy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #1a2744;
            --navy-mid: #243159;
            --navy-light: #2e3f70;
            --gold: #f5c842;
            --gold-dark: #d4a91a;
            --cream: #fdf8ee;
            --sky: #5ba4f5;
            --sky-light: #e8f2fe;
            --green: #3ec97a;
            --red: #f25c5c;
            --gray: #8a94a6;
            --gray-light: #f0f2f7;
            --white: #ffffff;
            --shadow-sm: 0 2px 8px rgba(26, 39, 68, 0.10);
            --shadow-md: 0 6px 24px rgba(26, 39, 68, 0.14);
            --shadow-lg: 0 12px 40px rgba(26, 39, 68, 0.18);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── STARS BACKGROUND ── */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 30%, #243159 0%, #1a2744 60%, #0f1a35 100%);
            overflow: hidden;
        }

        .stars::before,
        .stars::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: white;
            box-shadow:
                80px 40px 0 rgba(255, 255, 255, 0.6),
                160px 120px 0 rgba(255, 255, 255, 0.4),
                240px 60px 0 rgba(255, 255, 255, 0.7),
                320px 180px 0 rgba(255, 255, 255, 0.3),
                400px 90px 0 rgba(255, 255, 255, 0.5),
                480px 210px 0 rgba(255, 255, 255, 0.6),
                560px 30px 0 rgba(255, 255, 255, 0.4),
                640px 150px 0 rgba(255, 255, 255, 0.7),
                720px 80px 0 rgba(255, 255, 255, 0.3),
                800px 200px 0 rgba(255, 255, 255, 0.5),
                120px 250px 0 rgba(255, 255, 255, 0.4),
                200px 320px 0 rgba(255, 255, 255, 0.6),
                280px 290px 0 rgba(255, 255, 255, 0.3),
                360px 350px 0 rgba(255, 255, 255, 0.5),
                440px 270px 0 rgba(255, 255, 255, 0.7),
                520px 380px 0 rgba(255, 255, 255, 0.4),
                600px 310px 0 rgba(255, 255, 255, 0.6),
                680px 390px 0 rgba(255, 255, 255, 0.3),
                760px 260px 0 rgba(255, 255, 255, 0.5),
                840px 340px 0 rgba(255, 255, 255, 0.4),
                900px 100px 0 rgba(255, 255, 255, 0.6),
                980px 220px 0 rgba(255, 255, 255, 0.3),
                1060px 50px 0 rgba(255, 255, 255, 0.5),
                1140px 170px 0 rgba(255, 255, 255, 0.7),
                1220px 280px 0 rgba(255, 255, 255, 0.4);
        }

        .stars::after {
            width: 1px;
            height: 1px;
            box-shadow:
                50px 150px 0 rgba(255, 255, 255, 0.5),
                130px 70px 0 rgba(255, 255, 255, 0.3),
                210px 200px 0 rgba(255, 255, 255, 0.6),
                290px 130px 0 rgba(255, 255, 255, 0.4),
                370px 230px 0 rgba(255, 255, 255, 0.5),
                450px 160px 0 rgba(255, 255, 255, 0.7),
                530px 280px 0 rgba(255, 255, 255, 0.3),
                610px 110px 0 rgba(255, 255, 255, 0.5),
                690px 240px 0 rgba(255, 255, 255, 0.6),
                770px 170px 0 rgba(255, 255, 255, 0.4),
                850px 290px 0 rgba(255, 255, 255, 0.3),
                930px 130px 0 rgba(255, 255, 255, 0.5),
                1010px 250px 0 rgba(255, 255, 255, 0.6),
                1090px 80px 0 rgba(255, 255, 255, 0.4),
                1170px 200px 0 rgba(255, 255, 255, 0.7);
        }

        /* ── PAGE WRAPPER ── */
        #app {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ══════════════════════════════
     AUTH SCREEN
  ══════════════════════════════ */
        #auth-screen {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: fadeUp 0.5s ease both;
            max-height: 100vh;
            overflow-y: auto;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-logo .cross {
            font-size: 40px;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 12px rgba(245, 200, 66, 0.5));
        }

        .auth-logo h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.4rem;
            color: var(--gold);
            letter-spacing: 1px;
            line-height: 1;
            text-shadow: 0 2px 12px rgba(245, 200, 66, 0.35);
        }

        .auth-logo p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
            max-height: 80vh;
            overflow-y: auto;
        }

        .auth-card::-webkit-scrollbar {
            width: 4px;
        }

        .auth-card::-webkit-scrollbar-track {
            background: transparent;
        }

        .auth-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .auth-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: var(--gold);
            color: var(--navy);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(245, 200, 66, 0.08);
            box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.15);
        }

        /* Avatar picker */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 6px;
        }

        .avatar-opt {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.07);
            transition: all 0.15s;
        }

        .avatar-opt:hover {
            background: rgba(245, 200, 66, 0.15);
            transform: scale(1.08);
        }

        .avatar-opt.selected {
            border-color: var(--gold);
            background: rgba(245, 200, 66, 0.2);
            box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .btn-primary:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 200, 66, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(242, 92, 92, 0.15);
            border: 1px solid rgba(242, 92, 92, 0.3);
            color: #ff8a8a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 14px;
        }

        /* ══════════════════════════════
     MAIN APP LAYOUT
  ══════════════════════════════ */
        #main-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
        }

        #main-screen.visible {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(15, 26, 53, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-header {
            padding: 20px 18px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--navy);
            font-weight: 900;
            flex-shrink: 0;
        }

        .sidebar-brand span {
            font-family: 'Fredoka One', cursive;
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .user-profile {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
        }

        .user-avatar-sm {
            width: 38px;
            height: 38px;
            background: rgba(245, 200, 66, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            border: 2px solid rgba(245, 200, 66, 0.3);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-info .uname {
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-info .ustatus {
            color: var(--green);
            font-size: 0.72rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-info .ustatus::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
        }

        .btn-logout {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.15s;
            border-radius: 6px;
        }

        .btn-logout:hover {
            color: var(--red);
        }

        /* Nav */
        .sidebar-nav {
            padding: 12px 10px;
        }

        .nav-section-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 8px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.15s;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }

        .nav-item.active {
            background: rgba(245, 200, 66, 0.12);
            color: var(--gold);
        }

        .nav-item .nav-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--red);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        /* Online users list */
        .sidebar-users {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
        }

        .sidebar-users::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-users::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-users::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .user-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .user-list-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .user-list-item.active-chat {
            background: rgba(91, 164, 245, 0.12);
        }

        .user-list-item .ul-avatar {
            width: 32px;
            height: 32px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .user-list-item .ul-name {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            font-size: 0.85rem;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ul-unread {
            background: var(--sky);
            color: white;
            font-size: 0.68rem;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 10px;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
        }

        /* Top bar */
        .topbar {
            padding: 0 24px;
            height: 60px;
            background: rgba(15, 26, 53, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-icon {
            font-size: 1.3rem;
        }

        .topbar h2 {
            color: white;
            font-size: 1.05rem;
            font-weight: 800;
            flex: 1;
        }

        .topbar .topbar-sub {
            color: var(--gray);
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* Chat area */
        .chat-view {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .chat-view.visible {
            display: flex;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message-bubble {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: msgPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            max-width: 70%;
        }

        @keyframes msgPop {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message-bubble.own {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .message-bubble .msg-avatar {
            width: 32px;
            height: 32px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .msg-content {
            max-width: calc(100% - 44px);
        }

        .msg-meta {
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-bubble.own .msg-meta {
            flex-direction: row-reverse;
        }

        .msg-meta .msg-name {
            color: var(--sky);
        }

        .message-bubble.own .msg-meta .msg-name {
            color: var(--gold);
        }

        .msg-text {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 14px;
            border-radius: 14px 14px 14px 4px;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-bubble.own .msg-text {
            background: var(--navy-light);
            border-color: rgba(91, 164, 245, 0.2);
            border-radius: 14px 14px 4px 14px;
            color: white;
        }

        /* Date divider */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 0;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.2);
            gap: 12px;
        }

        .empty-state .es-icon {
            font-size: 3rem;
        }

        .empty-state p {
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Input area */
        .input-area {
            padding: 16px 24px;
            background: rgba(15, 26, 53, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .msg-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            max-height: 120px;
            line-height: 1.4;
        }

        .msg-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .msg-input:focus {
            border-color: rgba(245, 200, 66, 0.4);
        }

        .btn-send {
            width: 46px;
            height: 46px;
            background: var(--gold);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            flex-shrink: 0;
            color: var(--navy);
        }

        .btn-send:hover {
            background: var(--gold-dark);
            transform: scale(1.07);
            box-shadow: 0 4px 14px rgba(245, 200, 66, 0.35);
        }

        .btn-send:active {
            transform: scale(0.97);
        }

        /* NOTIFICATION TOAST */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--navy-mid);
            border: 1px solid rgba(91, 164, 245, 0.3);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            pointer-events: auto;
            max-width: 300px;
        }

        .toast.leaving {
            animation: toastOut 0.25s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateX(40px) scale(0.9);
            }
        }

        .toast .toast-avatar {
            font-size: 1.4rem;
        }

        .toast .toast-name {
            color: var(--sky);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(10, 18, 40, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-box {
            background: var(--navy-mid);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 28px;
            width: 90%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.3s ease both;
        }

        .modal-box h3 {
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .sidebar {
                width: 220px;
            }

            .messages-area {
                padding: 14px 14px;
            }

            .input-area {
                padding: 12px 14px;
            }
        }

        @media (max-width: 500px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                width: 240px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="stars"></div>

    <div id="app">

        <!-- ══ AUTH SCREEN ══ -->
        <div id="auth-screen">
            <div class="auth-logo">
                <div class="cross">✝️</div>
                <h1>VCA Connect</h1>
                <p>Victory Christian Academy</p>
            </div>

            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <div id="auth-error" class="error-msg" style="display:none;"></div>

                <!-- LOGIN FORM -->
                <div id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password"
                            autocomplete="current-password">
                    </div>
                    <button class="btn-primary" onclick="handleLogin()">Sign In ✨</button>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signup-form" style="display:none;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="signup-username" placeholder="Choose a unique username"
                            autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password"
                            autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="Repeat your password"
                            autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Choose Your Avatar</label>
                        <div class="avatar-grid" id="avatar-grid"></div>
                    </div>
                    <button class="btn-primary" onclick="handleSignup()">Create Account 🎉</button>
                </div>
            </div>
        </div>

        <!-- ══ MAIN APP ══ -->
        <div id="main-screen">

            <!-- SIDEBAR -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-brand">
                        <div class="logo-icon">✝</div>
                        <span>VCA Connect</span>
                    </div>
                    <div class="user-profile">
                        <div class="user-avatar-sm" id="current-avatar"></div>
                        <div class="user-info">
                            <div class="uname" id="current-username"></div>
                            <div class="ustatus">Online</div>
                        </div>
                        <button class="btn-logout" title="Sign Out" onclick="handleLogout()">⬅</button>
                    </div>
                </div>

                <div class="sidebar-nav">
                    <div class="nav-section-label">Channels</div>
                    <div class="nav-item active" id="nav-public" onclick="openPublicChat()">
                        <span class="nav-icon">📢</span> Public Chat
                    </div>
                    <div class="nav-section-label" style="margin-top:10px;">Direct Messages</div>
                </div>

                <div class="sidebar-users" id="users-list">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">

                <!-- PUBLIC CHAT VIEW -->
                <div class="chat-view visible" id="public-view">
                    <div class="topbar">
                        <span class="topbar-icon">📢</span>
                        <div>
                            <h2>Public Chat</h2>
                            <div class="topbar-sub" id="public-count">0 students online</div>
                        </div>
                    </div>
                    <div class="messages-area" id="public-messages">
                        <div class="empty-state" id="public-empty">
                            <div class="es-icon">💬</div>
                            <p>Be the first to say hello!</p>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea class="msg-input" id="public-input" rows="1" placeholder="Message everyone…"
                            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPublic()}"
                            oninput="autoResize(this)"></textarea>
                        <button class="btn-send" onclick="sendPublic()">➤</button>
                    </div>
                </div>

                <!-- PRIVATE CHAT VIEW -->
                <div class="chat-view" id="private-view">
                    <div class="topbar" id="private-topbar">
                        <span class="topbar-icon" id="private-chat-avatar"></span>
                        <div>
                            <h2 id="private-chat-name">Private Chat</h2>
                            <div class="topbar-sub">Private conversation</div>
                        </div>
                    </div>
                    <div class="messages-area" id="private-messages">
                        <div class="empty-state" id="private-empty">
                            <div class="es-icon">🔒</div>
                            <p>Start a private conversation!</p>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea class="msg-input" id="private-input" rows="1" placeholder="Send a private message…"
                            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPrivate()}"
                            oninput="autoResize(this)"></textarea>
                        <button class="btn-send" onclick="sendPrivate()">➤</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
        // ══════════════════════════════════════════════════════
        // CONSTANTS & STATE
        // ══════════════════════════════════════════════════════
        const AVATARS = ['🦁', '🐯', '🦊', '🐺', '🐼', '🐸', '🐧', '🦋', '🌟', '🦄', '🐉', '🦅', '🐬', '🌈', '🍀'];
        // Password hashing via Web Crypto API (SHA-256 + random salt)
        async function hashPassword(password) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, "0")).join("");
            const data = new TextEncoder().encode(saltHex + password);
            const buf = await crypto.subtle.digest("SHA-256", data);
            const hashHex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
            return saltHex + ":" + hashHex;
        }
        async function verifyPassword(password, stored) {
            const [saltHex, storedHash] = stored.split(":");
            const data = new TextEncoder().encode(saltHex + password);
            const buf = await crypto.subtle.digest("SHA-256", data);
            const hashHex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
            return hashHex === storedHash;
        }

        let currentUser = null;
        let activePrivatePeer = null;
        let unreadCounts = {}; // { username: count }

        // ── Load / Save LocalStorage ──
        function loadData(key, def) {
            try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
        }
        function saveData(key, val) {
            localStorage.setItem(key, JSON.stringify(val));
        }

        let users = loadData('vca_users', {});   // { username: { hash, avatar } }
        let pubMsgs = loadData('vca_public', []);   // [{ from, avatar, text, ts }]
        let privMap = loadData('vca_private', {});   // { convKey: [{ from, to, avatar, text, ts }] }

        function convKey(a, b) { return [a, b].sort().join('::'); }

        // ── Session ──
        function loadSession() {
            const s = loadData('vca_session', null);
            if (s && users[s.username]) { currentUser = s; }
        }
        function saveSession() { saveData('vca_session', currentUser); }
        function clearSession() { localStorage.removeItem('vca_session'); }

        // ══════════════════════════════════════════════════════
        // AUTH
        // ══════════════════════════════════════════════════════
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0) === (tab === 'login'));
            });
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg; el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('auth-error').style.display = 'none';
        }

        // Build avatar grid
        (function buildAvatarGrid() {
            const grid = document.getElementById('avatar-grid');
            AVATARS.forEach((av, i) => {
                const div = document.createElement('div');
                div.className = 'avatar-opt' + (i === 0 ? ' selected' : '');
                div.dataset.avatar = av;
                div.textContent = av;
                div.onclick = () => {
                    document.querySelectorAll('.avatar-opt').forEach(d => d.classList.remove('selected'));
                    div.classList.add('selected');
                };
                grid.appendChild(div);
            });
        })();

        function getSelectedAvatar() {
            return document.querySelector('.avatar-opt.selected')?.dataset.avatar || AVATARS[0];
        }

        async function handleSignup() {
            const un = document.getElementById('signup-username').value.trim();
            const pw = document.getElementById('signup-password').value;
            const pw2 = document.getElementById('signup-confirm').value;
            const av = getSelectedAvatar();

            if (!un) return showError('Please enter a username.');
            if (un.length < 3) return showError('Username must be at least 3 characters.');
            if (!/^[a-zA-Z0-9_]+$/.test(un)) return showError('Username can only contain letters, numbers, and underscores.');
            if (users[un]) return showError('That username is already taken! Try another.');
            if (!pw) return showError('Please enter a password.');
            if (pw.length < 4) return showError('Password must be at least 4 characters.');
            if (pw !== pw2) return showError('Passwords do not match.');

            const hash = await hashPassword(pw);
            users[un] = { hash, avatar: av };
            saveData('vca_users', users);

            currentUser = { username: un, avatar: av };
            saveSession();
            hideError();
            launchApp();
        }

        async function handleLogin() {
            const un = document.getElementById('login-username').value.trim();
            const pw = document.getElementById('login-password').value;

            if (!un || !pw) return showError('Please fill in both fields.');
            if (!users[un]) return showError('No account found with that username.');

            const match = await verifyPassword(pw, users[un].hash);
            if (!match) return showError('Incorrect password. Try again!');

            currentUser = { username: un, avatar: users[un].avatar };
            saveSession();
            hideError();
            launchApp();
        }

        function handleLogout() {
            currentUser = null;
            activePrivatePeer = null;
            unreadCounts = {};
            clearSession();
            document.getElementById('main-screen').classList.remove('visible');
            document.getElementById('auth-screen').style.display = '';
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
        }

        // ══════════════════════════════════════════════════════
        // APP INIT
        // ══════════════════════════════════════════════════════
        function launchApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').classList.add('visible');

            document.getElementById('current-username').textContent = currentUser.username;
            document.getElementById('current-avatar').textContent = currentUser.avatar;

            renderUsersList();
            renderPublicMessages();
            openPublicChat();
            startPolling();
        }

        // ══════════════════════════════════════════════════════
        // NAVIGATION
        // ══════════════════════════════════════════════════════
        function openPublicChat() {
            document.getElementById('public-view').classList.add('visible');
            document.getElementById('private-view').classList.remove('visible');
            document.getElementById('nav-public').classList.add('active');
            activePrivatePeer = null;
            document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('active-chat'));
            renderPublicMessages();
        }

        function openPrivateChat(username) {
            if (username === currentUser.username) return;
            activePrivatePeer = username;
            document.getElementById('public-view').classList.remove('visible');
            document.getElementById('private-view').classList.add('visible');
            document.getElementById('nav-public').classList.remove('active');

            const peer = users[username];
            document.getElementById('private-chat-avatar').textContent = peer?.avatar || '👤';
            document.getElementById('private-chat-name').textContent = username;

            // clear unread
            unreadCounts[username] = 0;
            renderUsersList();
            renderPrivateMessages();
        }

        // ══════════════════════════════════════════════════════
        // RENDER USERS LIST
        // ══════════════════════════════════════════════════════
        function renderUsersList() {
            const container = document.getElementById('users-list');
            const otherUsers = Object.keys(users).filter(u => u !== currentUser.username);
            container.innerHTML = '';

            if (otherUsers.length === 0) {
                container.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:0.78rem;font-weight:700;padding:8px 20px;">No other students yet</div>';
                return;
            }

            otherUsers.forEach(u => {
                const item = document.createElement('div');
                item.className = 'user-list-item' + (activePrivatePeer === u ? ' active-chat' : '');
                const unread = unreadCounts[u] || 0;

                item.innerHTML = `
      <div class="ul-avatar">${users[u].avatar}</div>
      <div class="ul-name">${u}</div>
      ${unread > 0 ? `<div class="ul-unread">${unread}</div>` : ''}
    `;
                item.onclick = () => openPrivateChat(u);
                container.appendChild(item);
            });
        }

        function updatePublicCount() {
            const count = Object.keys(users).length;
            document.getElementById('public-count').textContent = `${count} student${count !== 1 ? 's' : ''} registered`;
        }

        // ══════════════════════════════════════════════════════
        // PUBLIC CHAT
        // ══════════════════════════════════════════════════════
        function sendPublic() {
            const input = document.getElementById('public-input');
            const text = input.value.trim();
            if (!text) return;

            pubMsgs.push({ from: currentUser.username, avatar: currentUser.avatar, text, ts: Date.now() });
            saveData('vca_public', pubMsgs);
            input.value = ''; input.style.height = '';
            renderPublicMessages();
        }

        function renderPublicMessages() {
            const container = document.getElementById('public-messages');
            const empty = document.getElementById('public-empty');

            if (pubMsgs.length === 0) {
                empty.style.display = 'flex';
                // remove old bubbles
                container.querySelectorAll('.message-bubble,.date-divider').forEach(el => el.remove());
                return;
            }
            empty.style.display = 'none';
            container.querySelectorAll('.message-bubble,.date-divider').forEach(el => el.remove());

            let lastDate = null;
            pubMsgs.forEach(msg => {
                const d = new Date(msg.ts);
                const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                if (dateStr !== lastDate) {
                    lastDate = dateStr;
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.textContent = dateStr;
                    container.appendChild(div);
                }
                container.appendChild(buildBubble(msg, msg.from === currentUser.username));
            });

            container.scrollTop = container.scrollHeight;
            updatePublicCount();
        }

        // ══════════════════════════════════════════════════════
        // PRIVATE CHAT
        // ══════════════════════════════════════════════════════
        function sendPrivate() {
            if (!activePrivatePeer) return;
            const input = document.getElementById('private-input');
            const text = input.value.trim();
            if (!text) return;

            const key = convKey(currentUser.username, activePrivatePeer);
            if (!privMap[key]) privMap[key] = [];
            privMap[key].push({ from: currentUser.username, to: activePrivatePeer, avatar: currentUser.avatar, text, ts: Date.now() });
            saveData('vca_private', privMap);
            input.value = ''; input.style.height = '';
            renderPrivateMessages();
        }

        function renderPrivateMessages() {
            if (!activePrivatePeer) return;
            const container = document.getElementById('private-messages');
            const empty = document.getElementById('private-empty');
            const key = convKey(currentUser.username, activePrivatePeer);
            const msgs = privMap[key] || [];

            if (msgs.length === 0) {
                empty.style.display = 'flex';
                container.querySelectorAll('.message-bubble,.date-divider').forEach(el => el.remove());
                return;
            }
            empty.style.display = 'none';
            container.querySelectorAll('.message-bubble,.date-divider').forEach(el => el.remove());

            let lastDate = null;
            msgs.forEach(msg => {
                const d = new Date(msg.ts);
                const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                if (dateStr !== lastDate) {
                    lastDate = dateStr;
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.textContent = dateStr;
                    container.appendChild(div);
                }
                container.appendChild(buildBubble(msg, msg.from === currentUser.username));
            });

            container.scrollTop = container.scrollHeight;
        }

        // ══════════════════════════════════════════════════════
        // BUILD MESSAGE BUBBLE
        // ══════════════════════════════════════════════════════
        function buildBubble(msg, isOwn) {
            const wrap = document.createElement('div');
            wrap.className = 'message-bubble' + (isOwn ? ' own' : '');

            const time = new Date(msg.ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            wrap.innerHTML = `
    <div class="msg-avatar">${msg.avatar}</div>
    <div class="msg-content">
      <div class="msg-meta">
        <span class="msg-name">${isOwn ? 'You' : msg.from}</span>
        <span>${time}</span>
      </div>
      <div class="msg-text">${escapeHtml(msg.text)}</div>
    </div>
  `;
            return wrap;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ══════════════════════════════════════════════════════
        // POLLING (simulate real-time for demo)
        // ══════════════════════════════════════════════════════
        let lastPublicLen = 0;
        let lastPrivateLens = {};

        function startPolling() {
            lastPublicLen = pubMsgs.length;
            Object.keys(users).filter(u => u !== currentUser.username).forEach(u => {
                const key = convKey(currentUser.username, u);
                lastPrivateLens[key] = (privMap[key] || []).length;
            });

            setInterval(() => {
                // Reload from storage (in case another tab sent a message)
                pubMsgs = loadData('vca_public', []);
                privMap = loadData('vca_private', {});
                users = loadData('vca_users', {});

                // Check new public
                if (pubMsgs.length > lastPublicLen) {
                    const newMsgs = pubMsgs.slice(lastPublicLen);
                    lastPublicLen = pubMsgs.length;
                    if (document.getElementById('public-view').classList.contains('visible')) {
                        renderPublicMessages();
                    }
                    newMsgs.forEach(m => {
                        if (m.from !== currentUser.username && !document.getElementById('public-view').classList.contains('visible')) {
                            showToast(m.from, m.avatar, `${m.text.substring(0, 40)}${m.text.length > 40 ? '…' : ''}`, () => openPublicChat());
                        }
                    });
                }

                // Check new private
                Object.keys(users).filter(u => u !== currentUser.username).forEach(u => {
                    const key = convKey(currentUser.username, u);
                    const msgs = privMap[key] || [];
                    const prev = lastPrivateLens[key] || 0;
                    if (msgs.length > prev) {
                        const newMsgs = msgs.slice(prev).filter(m => m.from !== currentUser.username);
                        lastPrivateLens[key] = msgs.length;
                        if (newMsgs.length > 0) {
                            const peerAvatar = users[u]?.avatar || '👤';
                            if (activePrivatePeer === u) {
                                renderPrivateMessages();
                            } else {
                                unreadCounts[u] = (unreadCounts[u] || 0) + newMsgs.length;
                                renderUsersList();
                                showToast(u, peerAvatar, `${newMsgs[newMsgs.length - 1].text.substring(0, 40)}…`, () => openPrivateChat(u));
                            }
                        }
                    }
                });

                renderUsersList();
            }, 1500);
        }

        // ══════════════════════════════════════════════════════
        // TOAST NOTIFICATIONS
        // ══════════════════════════════════════════════════════
        function showToast(name, avatar, text, onClick) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
    <span class="toast-avatar">${avatar}</span>
    <div>
      <div><span class="toast-name">${name}</span> sent a message</div>
      <div style="color:rgba(255,255,255,0.55);font-size:0.8rem;margin-top:2px;">${escapeHtml(text)}</div>
    </div>
  `;
            toast.onclick = () => { toast.remove(); if (onClick) onClick(); };
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('leaving');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ══════════════════════════════════════════════════════
        // UTILITIES
        // ══════════════════════════════════════════════════════
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // ══════════════════════════════════════════════════════
        // BOOT
        // ══════════════════════════════════════════════════════
        loadSession();
        if (currentUser) {
            launchApp();
        }

        // Enter key in auth
        document.getElementById('login-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('signup-confirm').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSignup();
        });
    </script>
</body>

</html>
